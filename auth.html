<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXESTORE | Authentication</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="auth.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, var(--dark-light) 0%, var(--dark) 100%);
            padding: 20px;
        }

        .auth-container {
            position: relative;
            transform: scale(1);
            opacity: 1;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .back-home {
            position: absolute;
            top: -50px;
            left: 0;
            color: var(--text-muted);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: var(--transition);
        }

        .back-home:hover {
            color: var(--primary);
            transform: translateX(-5px);
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <a href="index.html" class="back-home">
            <i class="fas fa-arrow-left"></i> Back to Store
        </a>

        <!-- Login Form -->
        <div class="auth-box login-box active" id="login-box">
            <div class="auth-header">
                <h2>Welcome <span class="gradient-text">Back</span></h2>
                <p>Log in to your account to continue</p>
            </div>
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <input type="email" id="login-email" placeholder="Email Address" required>
                    <span class="form-icon"><i class="fas fa-envelope"></i></span>
                </div>
                <div class="form-group">
                    <input type="password" id="login-password" placeholder="Password" required>
                    <span class="form-icon"><i class="fas fa-lock"></i></span>
                </div>
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox"> <span>Remember me</span>
                    </label>
                    <a href="#" class="forgot-password">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Log In</button>
                <p class="auth-switch">Don't have an account? <a href="#" id="go-to-register">Register</a></p>
            </form>
        </div>

        <!-- Register Form -->
        <div class="auth-box register-box" id="register-box">
            <div class="auth-header">
                <h2>Create <span class="gradient-text">Account</span></h2>
                <p>Join AXESTORE for a premium experience</p>
            </div>
            <form id="register-form" class="auth-form">
                <div class="form-group">
                    <input type="text" id="register-name" placeholder="Full Name" required>
                    <span class="form-icon"><i class="fas fa-user"></i></span>
                </div>
                <div class="form-group">
                    <input type="email" id="register-email" placeholder="Email Address" required>
                    <span class="form-icon"><i class="fas fa-envelope"></i></span>
                </div>
                <div class="form-group">
                    <input type="password" id="register-password" placeholder="Password" required>
                    <span class="form-icon"><i class="fas fa-lock"></i></span>
                </div>
                <div class="form-group">
                    <input type="password" id="register-confirm-password" placeholder="Confirm Password" required>
                    <span class="form-icon"><i class="fas fa-lock-circle"></i></span>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Create Account</button>
                <p class="auth-switch">Already have an account? <a href="#" id="go-to-login">Log In</a></p>
            </form>
        </div>
    </div>

    <!-- Re-using script.js for notification system if needed, though auth.js handles logic -->
    <script src="script.js"></script>
    <script src="auth.js"></script>
</body>

</html>
